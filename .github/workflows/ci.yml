name: CI

on:
  push:
    branches:
      - master
    tags:
      - '**'
  pull_request: {}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: install clamav
        run: |
          sudo apt-get update
          sudo apt-get install -y clamav clamav-daemon
          # The apt post-install triggers freshclam once. Hitting it again hits a 429
          # from the ClamAV CDN ("no more than once an hour"), so wait for the DB files
          # the first run produced instead of invoking freshclam ourselves.
          sudo systemctl enable --now clamav-freshclam || true
          for i in {1..60}; do
            if ls /var/lib/clamav/main.c[vl]d >/dev/null 2>&1; then
              echo "signature DB present after ${i}s"
              break
            fi
            sleep 2
          done
          if ! ls /var/lib/clamav/main.c[vl]d >/dev/null 2>&1; then
            echo "freshclam never produced a signature DB" >&2
            sudo journalctl -u clamav-freshclam --no-pager | tail -50
            exit 1
          fi
          sudo systemctl restart clamav-daemon
          sudo systemctl status clamav-daemon --no-pager || true

      - name: install dependencies
        run: make install

      - name: lint
        run: make lint

      - name: wait for clamd
        run: |
          for i in {1..30}; do
            if sudo clamdscan --ping 1 >/dev/null 2>&1; then
              echo "clamd ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "clamd did not become ready" >&2
          sudo systemctl status clamav-daemon --no-pager || true
          exit 1

      - name: test
        run: make test

      - name: codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  deploy:
    needs:
      - test
    if: "success() && startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-latest

    steps:
      - run: curl ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
